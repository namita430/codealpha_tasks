<!DOCTYPE html>
<html>

<head>

    <title>AI FAQ Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        #chatbox {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        #messages {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            text-align: left;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>

</head>

<body>

    <h2>AI FAQ Chatbot</h2>

    <div id="chatbox">

        <div id="messages"></div>

        <input id="userInput" placeholder="Ask about AI">

        <button onclick="sendMessage()">Send</button>

    </div>

    <script>

        function sendMessage() {

            let input = document.getElementById("userInput")
            let message = input.value

            if (message.trim() === "") {
                return
            }

            let messages = document.getElementById("messages")

            messages.innerHTML += "<p><b>You:</b> " + message + "</p>"

            fetch("/chat", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    message: message
                })

            })

                .then(response => response.json())

                .then(data => {

                    messages.innerHTML += "<p><b>Bot:</b> " + data.response + "</p>"

                    messages.scrollTop = messages.scrollHeight

                })

                .catch(error => {

                    messages.innerHTML += "<p><b>Bot:</b> Error getting response</p>"

                })

            input.value = ""

        }

    </script>

</body>

</html>
